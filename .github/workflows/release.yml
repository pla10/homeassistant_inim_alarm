name: Release

on:
  # Auto-attach the HACS zip when a release is published from the GitHub UI
  release:
    types: [published]
  # Allow creating a release manually (tag + release + zip) from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create/release (e.g. v2.3.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build HACS zip
        run: |
          cd custom_components/inim_alarm
          zip -r ../../inim_alarm.zip . \
            -x "*/__pycache__/*" "*.pyc"
          cd "$GITHUB_WORKSPACE"
          echo "=== zip contents ==="
          unzip -l inim_alarm.zip

      - name: Attach zip to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: inim_alarm.zip

      - name: Create release and attach zip (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          generate_release_notes: true
          files: inim_alarm.zip
